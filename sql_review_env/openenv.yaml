spec_version: 1
name: sql_review_env
type: space
runtime: fastapi
app: server.app:app
port: 8000

metadata:
  title: SQL Review Environment
  description: >
    A real-world OpenEnv environment where an AI agent must review and fix
    broken SQL queries. Tasks range from simple syntax errors to complex
    security vulnerabilities and logic bugs.
  difficulty: easy-to-hard
  domain: data-engineering
  tags:
    - sql
    - code-review
    - security
    - real-world
    - openenv

tasks:
  - id: easy_001
    description: Fix syntax errors in a broken SELECT query
    difficulty: easy
    min_score: 0.0
    max_score: 1.0

  - id: medium_001
    description: Fix missing GROUP BY clause in an aggregation query
    difficulty: medium
    min_score: 0.0
    max_score: 1.0

  - id: hard_001
    description: Fix SQL injection vulnerability and logic error
    difficulty: hard
    min_score: 0.0
    max_score: 1.0

observation_space:
  task_id: string
  task_description: string
  broken_sql: string
  feedback: string
  score: float
  done: boolean
  expected_output: string

action_space:
  sql: string

reward_function:
  type: partial_progress
  range: [0.0, 1.0]
  description: >
    Rewards are computed incrementally across the full trajectory.
    Partial credit is given for structural correctness (SELECT, FROM keywords),
    query executability, and correctness of returned rows.
    Penalties are applied for empty submissions and infinite loops.
  components:
    - name: keyword_select
      weight: 0.2
      description: SELECT keyword present in query
    - name: keyword_from
      weight: 0.2
      description: FROM keyword present in query
    - name: executes_without_error
      weight: 0.2
      description: Query runs without SQL syntax error
    - name: correct_rows_returned
      weight: 0.3
      description: Query returns the expected rows/result
    - name: task_specific_bonus
      weight: 0.3
      description: >
        GROUP BY present for medium task,
        AND logic + injection fix for hard task
  penalties:
    - name: empty_submission
      value: -0.1
      description: Agent submits an empty or whitespace-only query
    - name: repeated_identical_action
      value: -0.1
      description: Agent submits the same query more than once (loop detection)

inference:
  script: inference.py
  env_vars:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN
